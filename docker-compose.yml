services:

  postgres:
    image: postgres:16
    container_name: biblioteca-postgres
    environment:
      POSTGRES_DB: ad_biblioteca
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: castelao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: biblioteca-api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ad_biblioteca
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: castelao
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  postgres_data: